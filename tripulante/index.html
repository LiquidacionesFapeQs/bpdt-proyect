<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HT-BPDT | Tripulante</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .toast { animation: slideIn 0.3s ease forwards; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">

  <div id="app" class="max-w-2xl mx-auto p-4">
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="space-y-6">
      <div class="text-center py-8">
        <h1 class="text-3xl font-bold text-blue-600">HT-BPDT</h1>
        <p class="text-gray-500 mt-2">Sistema de Gestión Documental de Transporte</p>
        <p class="text-sm text-gray-400 mt-1">Portal Tripulante</p>
      </div>

      <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-8">
        <h2 class="text-2xl font-semibold mb-6 text-center">Iniciar Sesión</h2>
        
        <div class="space-y-5">
          <div>
            <label class="block text-sm font-medium mb-1">DNI (8 dígitos)</label>
            <input id="dni" type="text" maxlength="8" 
                   class="w-full px-4 py-3 border border-gray-300 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="12345678">
          </div>
          
          <div>
            <label class="block text-sm font-medium mb-1">Contraseña</label>
            <input id="password" type="password" 
                   class="w-full px-4 py-3 border border-gray-300 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Ingresa tu contraseña">
          </div>

          <button onclick="login()" 
                  class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl transition">
            Ingresar
          </button>
        </div>

        <div class="mt-6 text-center text-sm text-gray-500">
          ¿Primera vez? Tu contraseña inicial es los <strong>últimos 4 dígitos de tu DNI</strong>
        </div>
      </div>
    </div>

    <!-- DASHBOARD (se muestra después del login) -->
    <div id="dashboardScreen" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h1 class="text-2xl font-bold">Hola, <span id="nombreUsuario"></span></h1>
          <p class="text-gray-500" id="cargoUsuario"></p>
        </div>
        <button onclick="logout()" 
                class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-950 rounded-xl flex items-center gap-2">
          <i class="fas fa-sign-out-alt"></i> Salir
        </button>
      </div>

      <div class="grid grid-cols-1 gap-6">
        <!-- KPI Card -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl shadow p-6">
          <div class="flex justify-between">
            <div>
              <p class="text-sm text-gray-500">Mi Cumplimiento</p>
              <p id="kpiPorcentaje" class="text-5xl font-bold text-blue-600">0%</p>
            </div>
            <div id="calificacionBadge" 
                 class="px-4 py-2 rounded-xl text-sm font-semibold"></div>
          </div>
          <div class="mt-4 h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
            <div id="kpiBar" class="h-full bg-blue-600 rounded-full transition-all"></div>
          </div>
        </div>

        <!-- Documentos Pendientes -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl shadow p-6">
          <h3 class="font-semibold mb-4 flex items-center gap-2">
            <i class="fas fa-file-alt"></i> Mis Documentos Pendientes
          </h3>
          <div id="pendientesList" class="space-y-3">
            <!-- Se llena con JS -->
          </div>
        </div>

        <!-- Subir Documento -->
        <div class="bg-white dark:bg-gray-900 rounded-2xl shadow p-6">
          <h3 class="font-semibold mb-4">Subir Nuevo Documento</h3>
          
          <select id="tipoDocumento" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-700 rounded-xl mb-4">
            <option value="">Selecciona documento...</option>
          </select>

          <div id="uploadArea" 
               class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl p-8 text-center cursor-pointer hover:border-blue-400 transition">
            <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
            <p class="text-gray-500">Haz clic para subir foto o arrastra aquí</p>
            <input id="fileInput" type="file" accept="image/*" class="hidden">
          </div>

          <div id="previewContainer" class="hidden mt-4">
            <img id="imagePreview" class="max-h-64 mx-auto rounded-xl shadow" alt="Preview">
            <button onclick="subirDocumento()" 
                    class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold">
              Subir Documento
            </button>
          </div>

          <input id="fechaVencimiento" type="date" 
                 class="w-full mt-4 px-4 py-3 border border-gray-300 dark:border-gray-700 rounded-xl">
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 toast"></div>

  <script src="app.js"></script>
</body>
</html>
