<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT-BPDT | Portal Tripulación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="app-container" class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">HT-BPDT</h1>
            <p class="text-slate-500 text-xs font-medium uppercase tracking-widest">Módulo de Registro y Control</p>
        </div>

        <div id="view-login" class="space-y-4 animate-fade-in">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-600 ml-1">DNI</label>
                <input type="number" id="login-dni" placeholder="00000000" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-600 ml-1">CONTRASEÑA</label>
                <input type="password" id="login-pass" placeholder="••••" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-slate-800 transition-colors shadow-lg">INGRESAR</button>
            <p class="text-center text-sm text-slate-500">¿Eres nuevo? <a href="#" onclick="showView('register')" class="text-blue-600 font-bold hover:underline">Crea tu cuenta aquí</a></p>
        </div>

        <div id="view-register" class="hidden space-y-4 animate-fade-in">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest text-center">Registro de Usuario</h2>
            
            <div id="reg-step-1" class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                <label class="text-xs font-bold text-blue-700 block mb-2">VALIDA TU DNI</label>
                <div class="flex gap-2">
                    <input type="number" id="reg-dni" placeholder="DNI" class="flex-1 p-3 border-none rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="handleCheckDni()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Verificar</button>
                </div>
            </div>

            <div id="reg-fields" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-nombres" placeholder="Nombres" class="p-3 bg-slate-50 border rounded-xl text-sm">
                    <input type="text" id="reg-apellidos" placeholder="Apellidos" class="p-3 bg-slate-50 border rounded-xl text-sm">
                </div>

                <select id="reg-cargo" onchange="toggleFieldsByCargo()" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-medium">
                    <option value="">Seleccione Cargo</option>
                    <option value="CONDUCTOR">CONDUCTOR</option>
                    <option value="AUXILIAR">AUXILIAR</option>
                </select>

                <select id="reg-empresa" class="w-full p-3 bg-slate-50 border rounded-xl text-sm font-medium">
                    <option value="">Cargando empresas...</option>
                </select>

                <div class="space-y-3 p-4 bg-slate-50 rounded-xl border border-slate-200">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Documentación Obligatoria</p>
                    
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-700">Foto DNI:</label>
                        <input type="file" id="file-dni" accept="image/*,application/pdf" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        <label class="text-[10px] text-slate-500">Fecha de Vencimiento DNI:</label>
                        <input type="date" id="venc-dni" class="w-full p-2 text-sm border rounded-lg">
                    </div>

                    <div id="box-licencia" class="hidden space-y-1 border-t pt-2">
                        <label class="text-xs font-bold text-slate-700">Foto Licencia:</label>
                        <input type="file" id="file-licencia" accept="image/*,application/pdf" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                        <label class="text-[10px] text-slate-500">Fecha de Vencimiento Licencia:</label>
                        <input type="date" id="venc-licencia" class="w-full p-2 text-sm border rounded-lg">
                    </div>
                </div>

                <div class="p-3 bg-amber-50 rounded-lg border border-amber-100">
                    <p class="text-[10px] text-amber-700 leading-tight"><b>Nota:</b> Tu contraseña de acceso serán los <b>últimos 4 dígitos de tu DNI</b>.</p>
                </div>

                <button onclick="handleRegister()" id="btn-register" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">FINALIZAR REGISTRO</button>
            </div>
            
            <button onclick="showView('login')" class="w-full text-slate-400 text-xs font-bold hover:text-slate-600">VOLVER AL LOGIN</button>
        </div>

        <div id="view-dashboard" class="hidden space-y-6 animate-fade-in text-center">
            <div id="user-info" class="p-4 bg-slate-50 rounded-2xl border border-slate-100"></div>
            <div id="compliance-card" class="p-6 rounded-2xl text-white shadow-lg">
                <p class="text-xs opacity-80 uppercase tracking-widest mb-1">Estado de Cumplimiento</p>
                <h3 id="compliance-pct" class="text-4xl font-black">0%</h3>
                <p id="compliance-label" class="text-sm font-bold mt-1"></p>
            </div>
            <button onclick="location.reload()" class="w-full py-3 text-slate-400 text-xs font-bold border-t">CERRAR SESIÓN</button>
        </div>

        <div id="loader" class="hidden fixed inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center z-50">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-14 w-14 mb-4"></div>
            <p id="loader-text" class="text-sm font-bold text-slate-600 animate-pulse">Cargando...</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
