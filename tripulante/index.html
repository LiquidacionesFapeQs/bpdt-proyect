<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HT-BPDT | Tripulante</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .toast { animation: toastIn 0.3s ease forwards; }
    @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

<div class="max-w-[480px] mx-auto bg-white min-h-screen shadow-xl overflow-hidden">

  <!-- AUTH SCREEN -->
  <div id="authScreen">
    <div class="bg-blue-600 text-white px-6 pt-10 pb-8 text-center">
      <h1 class="text-4xl font-bold">HT-BPDT</h1>
      <p class="text-blue-100 mt-1">Control Documental de Transporte</p>
      <p class="text-xs mt-4 opacity-75">Portal Tripulante</p>
    </div>

    <div class="flex border-b">
      <button onclick="switchTab(0)" id="tabLogin" class="flex-1 py-4 text-sm font-semibold border-b-2 border-blue-600 text-blue-600">Iniciar Sesión</button>
      <button onclick="switchTab(1)" id="tabRegister" class="flex-1 py-4 text-sm font-semibold text-gray-500">Crear Cuenta</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="p-6">
      <div class="space-y-5">
        <div>
          <label class="text-xs font-medium text-gray-500">DNI (8 dígitos)</label>
          <input id="loginDni" type="text" maxlength="8" inputmode="numeric" class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500" placeholder="16528921">
        </div>
        <div>
          <label class="text-xs font-medium text-gray-500">Contraseña</label>
          <input id="loginPass" type="password" class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500" placeholder="Últimos 4 dígitos del DNI">
        </div>
        <button onclick="doLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition">Ingresar</button>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden p-6">
      <div class="space-y-5">
        <div>
          <label class="text-xs font-medium text-gray-500">DNI</label>
          <input id="regDni" type="text" maxlength="8" inputmode="numeric" oninput="if(this.value.length===8) checkDniAutoFill()" 
                 class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500" placeholder="12345678">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-medium text-gray-500">Nombres</label>
            <input id="regNames" type="text" class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-2xl">
          </div>
          <div>
            <label class="text-xs font-medium text-gray-500">Apellidos</label>
            <input id="regApellidos" type="text" class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-2xl">
          </div>
        </div>

        <div>
          <label class="text-xs font-medium text-gray-500">Empresa</label>
          <select id="regEmpresa" class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-2xl">
            <option value="">Cargando empresas...</option>
          </select>
          <p id="empresaStatus" class="text-xs text-gray-500 mt-1"></p>
        </div>

        <div>
          <label class="text-xs font-medium text-gray-500">Cargo</label>
          <select id="regCargo" onchange="toggleBreveteField()" class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-2xl">
            <option value="AUXILIAR">Auxiliar</option>
            <option value="CONDUCTOR">Conductor</option>
          </select>
        </div>

        <!-- Foto DNI -->
        <div class="bg-gray-50 p-4 rounded-2xl">
          <label class="text-xs font-medium text-gray-500 block mb-2">Foto DNI</label>
          <div onclick="triggerFile('dni')" class="border-2 border-dashed border-gray-300 rounded-2xl p-6 text-center cursor-pointer hover:border-blue-400">
            <i class="fas fa-camera text-3xl text-gray-400"></i>
            <p class="text-sm text-gray-500 mt-2">Toca para subir foto del DNI</p>
            <div id="previewDni" class="mt-3 text-xs text-green-600 font-medium hidden">✅ Archivo listo</div>
          </div>
          <input type="file" id="fileDni" accept="image/*" class="hidden" onchange="handleFile(this, 'dni')">
          <input type="date" id="dniVence" class="w-full mt-3 px-4 py-3 border border-gray-300 rounded-2xl text-sm">
        </div>

        <!-- Brevete -->
        <div id="breveteGroup" class="hidden bg-amber-50 p-4 rounded-2xl">
          <label class="text-xs font-medium text-gray-500 block mb-2">Foto Licencia (Brevete)</label>
          <div onclick="triggerFile('brevete')" class="border-2 border-dashed border-amber-300 rounded-2xl p-6 text-center cursor-pointer hover:border-amber-400">
            <i class="fas fa-id-card text-3xl text-amber-400"></i>
            <p class="text-sm text-amber-600 mt-2">Toca para subir foto del brevete</p>
            <div id="previewBrevete" class="mt-3 text-xs text-green-600 font-medium hidden">✅ Archivo listo</div>
          </div>
          <input type="file" id="fileBrevete" accept="image/*" class="hidden" onchange="handleFile(this, 'brevete')">
          <input type="date" id="breveteVence" class="w-full mt-3 px-4 py-3 border border-gray-300 rounded-2xl text-sm">
        </div>

        <button onclick="doRegister()" id="btnRegister" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl transition">Crear Cuenta</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD (simplificado por ahora) -->
  <div id="dashScreen" class="hidden flex flex-col min-h-screen">
    <div class="bg-blue-600 text-white p-6">
      <h2 id="dashNombre" class="text-2xl font-semibold"></h2>
      <p id="dashCargo" class="text-blue-100"></p>
    </div>
    <div class="p-6">
      <p>Dashboard cargado correctamente</p>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-gray-800 text-white px-5 py-3 rounded-2xl shadow-2xl"></div>
</div>

<script>
// ==================== CONFIG ====================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzO5nB4n5aJTdDtHZDahnQ8PU1350Yug4YBnLQUsDwoX6mPUcXLdQPo-oWZbQR6w1ps1Q/exec"; 

let currentUser = null;

// ==================== CALLBACKEND ====================
async function callBackend(action, payload = {}) {
  try {
    const fullPayload = { action, ...payload };
    console.log(`→ Enviando: ${action}`, fullPayload);

    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(fullPayload)
    });

    const text = await response.text();
    console.log("Respuesta raw:", text.substring(0, 400));

    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      const match = text.match(/\{[\s\S]*\}/);
      result = match ? JSON.parse(match[0]) : { status: "error", message: text };
    }

    if (result.status === "error") throw new Error(result.message || "Error del servidor");
    return result.data || result;

  } catch (err) {
    console.error("Error callBackend:", err);
    showToast(err.message || "Error de conexión", "error");
    throw err;
  }
}

// ==================== TABS ====================
function switchTab(n) {
  document.getElementById("loginForm").classList.toggle("hidden", n === 1);
  document.getElementById("registerForm").classList.toggle("hidden", n === 0);
}

// ==================== LOGIN ====================
async function doLogin() {
  const dni = document.getElementById("loginDni").value.trim();
  const pass = document.getElementById("loginPass").value.trim();
  if (!dni || dni.length !== 8) return showToast("DNI inválido", "error");

  try {
    const data = await callBackend("LOGIN", { username: dni, password: pass });
    currentUser = data;
    localStorage.setItem("bpdt_tripulante", JSON.stringify(data));
    showDashboard();
  } catch (e) {}
}

// ==================== CHECK DNI ====================
async function checkDniAutoFill() {
  const dni = document.getElementById("regDni").value.trim();
  if (dni.length !== 8) return;

  try {
    const res = await callBackend("CONSULTAR_DNI_REGISTRO", { dni });
    if (res.tiene_cuenta) {
      showToast("Este DNI ya tiene cuenta. Inicia sesión.", "error");
      switchTab(0);
      return;
    }
    if (res.found) {
      document.getElementById("regNames").value = res.nombres || "";
      document.getElementById("regApellidos").value = res.apellidos || "";
      document.getElementById("regEmpresa").value = res.empresaId || "";
      document.getElementById("regCargo").value = res.cargo || "AUXILIAR";
    }
  } catch (e) {}
}

// ==================== REGISTRO ====================
async function doRegister() {
  // ... (mantengo simple por ahora)
  showToast("Registro en desarrollo", "error");
}

// ==================== DASHBOARD ====================
function showDashboard() {
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("dashScreen").classList.remove("hidden");
  document.getElementById("dashNombre").textContent = currentUser.nombre || "Usuario";
}

// ==================== HELPERS ====================
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `fixed bottom-6 right-6 px-5 py-3 rounded-2xl shadow-2xl ${type === "success" ? "bg-green-600" : "bg-red-600"}`;
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 4000);
}

// ==================== INIT - CARGA DE EMPRESAS ====================
async function init() {
  console.log("🚀 Iniciando carga de empresas...");

  try {
    const empresas = await callBackend("GET_LISTA_EMPRESAS");
    console.log("✅ Empresas recibidas:", empresas);

    const sel = document.getElementById("regEmpresa");
    sel.innerHTML = '<option value="">Selecciona empresa...</option>';

    if (empresas && empresas.length > 0) {
      empresas.forEach(e => {
        const opt = document.createElement("option");
        opt.value = e.id;
        opt.textContent = e.nombre;
        sel.appendChild(opt);
      });
      document.getElementById("empresaStatus").innerHTML = `<span class="text-green-600">✓ ${empresas.length} empresas cargadas</span>`;
    } else {
      document.getElementById("empresaStatus").innerHTML = `<span class="text-red-600">⚠ No se encontraron empresas activas</span>`;
    }

  } catch (e) {
    console.error("❌ Error cargando empresas:", e);
    document.getElementById("empresaStatus").innerHTML = `<span class="text-red-600">✗ Error al cargar empresas: ${e.message}</span>`;
  }
}

window.onload = init;
</script>
</body>
</html>
