<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT-BPDT | Gestión de Tripulación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="app-container" class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">SISTEMA HT-BPDT</h1>
            <p class="text-gray-500 text-sm">Control de Cumplimiento Operativo</p>
        </div>

        <div id="view-login" class="space-y-4">
            <h2 class="text-lg font-semibold text-center border-b pb-2">Iniciar Sesión</h2>
            <input type="number" id="login-dni" placeholder="Ingrese su DNI" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="handleLogin()" id="btn-login" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">INGRESAR</button>
            <p class="text-center text-sm">¿No tienes cuenta? <a href="#" onclick="showView('register')" class="text-blue-600 font-bold">Regístrate aquí</a></p>
        </div>

        <div id="view-register" class="hidden space-y-4">
            <h2 class="text-lg font-semibold text-center border-b pb-2">Registro de Tripulante</h2>
            
            <div id="reg-step-1">
                <p class="text-xs text-gray-500 mb-1">Primero validaremos si tus datos ya existen:</p>
                <div class="flex gap-2">
                    <input type="number" id="reg-dni" placeholder="DNI" class="flex-1 p-3 border rounded-lg">
                    <button onclick="handleCheckDni()" class="bg-gray-800 text-white px-4 rounded-lg">Validar</button>
                </div>
            </div>

            <div id="reg-fields" class="hidden space-y-3 animate-pulse-once">
                <input type="text" id="reg-nombres" placeholder="Nombres" class="w-full p-3 border rounded-lg bg-gray-50">
                <input type="text" id="reg-apellidos" placeholder="Apellidos" class="w-full p-3 border rounded-lg bg-gray-50">
                
                <select id="reg-cargo" onchange="toggleFieldsByCargo()" class="w-full p-3 border rounded-lg">
                    <option value="">Seleccione su Cargo</option>
                    <option value="CONDUCTOR">CONDUCTOR</option>
                    <option value="AUXILIAR">AUXILIAR</option>
                </select>

                <select id="reg-empresa" class="w-full p-3 border rounded-lg">
                    <option value="">Cargando empresas...</option>
                </select>

                <input type="password" id="reg-pass" placeholder="Cree una contraseña" class="w-full p-3 border rounded-lg border-blue-300">

                <div class="bg-blue-50 p-3 rounded-lg space-y-2">
                    <p class="text-xs font-bold text-blue-800">Documentación Requerida:</p>
                    <div>
                        <label class="text-[10px] uppercase text-gray-500">Foto DNI (Frontal/Posterior)</label>
                        <input type="file" id="file-dni" accept="image/*,application/pdf" class="text-xs">
                    </div>
                    <div id="box-licencia" class="hidden">
                        <label class="text-[10px] uppercase text-gray-500">Licencia de Conducir</label>
                        <input type="file" id="file-licencia" accept="image/*,application/pdf" class="text-xs">
                    </div>
                </div>

                <button onclick="handleRegister()" id="btn-register" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold hover:bg-green-700 transition">FINALIZAR REGISTRO</button>
            </div>
            
            <button onclick="showView('login')" class="w-full text-gray-500 text-sm">Volver al inicio</button>
        </div>

        <div id="view-dashboard" class="hidden space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="font-bold text-gray-700">Mi Perfil</h2>
                <button onclick="location.reload()" class="text-red-500 text-xs font-bold">Cerrar Sesión</button>
            </div>
            <div id="user-info" class="text-center py-4 bg-gray-50 rounded-lg">
                </div>
            <div id="compliance-status" class="p-4 rounded-lg text-center font-bold text-white">
                </div>
            <div class="text-xs text-gray-400 italic text-center">
                * Los documentos subidos están sujetos a validación por el equipo BPDT.
            </div>
        </div>

        <div id="loader" class="hidden fixed inset-0 bg-white bg-opacity-80 flex flex-col items-center justify-center z-50">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p id="loader-text" class="text-sm font-semibold text-gray-600">Procesando...</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
