<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HT-BPDT | Tripulante</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* =========================================
       ESTILO EMPRESARIAL BPdT
       ========================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-page:      #F5F4F0;
      --bg-primary:   #FFFFFF;
      --bg-secondary: #F1EFE8;
      --text-primary:   #1A1A18;
      --text-secondary: #5F5E5A;
      --text-tertiary:  #888780;
      --border-light: rgba(0,0,0,0.10);
      --border-mid:   rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      --green: #1D9E75;
      --amber: #BA7517;
      --blue: #185FA5;
      --red: #A32D2D;
      --blue-bg: #E6F1FB;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background: var(--bg-primary);
      min-height: 100vh;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      border-left: 0.5px solid var(--border-light);
      border-right: 0.5px solid var(--border-light);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .auth-header {
      padding: 32px 24px 24px;
      text-align: center;
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-light);
    }
    .auth-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .logo-pill {
      display: inline-block;
      background: var(--blue-bg);
      color: var(--blue);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      margin-top: 16px;
      text-transform: uppercase;
    }

    /* Tabs */
    .tabs-row {
      display: flex;
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-light);
    }
    .tab-btn {
      flex: 1;
      padding: 16px 0;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--blue);
      border-bottom: 2px solid var(--blue);
    }

    /* Formularios */
    .form-wrapper {
      padding: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    
    .section-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .input-control {
      width: 100%;
      padding: 12px 16px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      font-size: 14px;
      background: var(--bg-primary);
      outline: none;
    }
    .input-control:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-bg);
    }

    select.input-control {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888780' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 14px;
      padding-right: 36px;
    }

    /* File Upload */
    .file-panel {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 20px;
      border: 0.5px solid var(--border-light);
    }
    .file-panel.amber {
      background: #FAEEDA;
      border-color: rgba(186, 117, 23, 0.2);
    }
    .drop-zone {
      border: 1px dashed var(--border-mid);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      background: var(--bg-primary);
    }
    .drop-zone:hover {
      border-color: var(--blue);
      background: var(--blue-bg);
    }

    /* Botones */
    .btn-primary, .btn-success {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: var(--blue); color: white; }
    .btn-success { background: var(--green); color: white; }

    /* Dashboard */
    .topbar {
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-light);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--blue-bg);
      color: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dash-body {
      padding: 24px;
      background: var(--bg-page);
      flex: 1;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app-container">

  <!-- AUTH SCREEN -->
  <div id="authScreen">
    <div class="auth-header">
      <h1 class="auth-title">HT-BPDT</h1>
      <p class="auth-subtitle">Control Documental de Transporte</p>
      <div class="logo-pill">Portal Tripulante</div>
    </div>

    <div class="tabs-row">
      <button onclick="switchTab(0)" id="tabLogin" class="tab-btn active">Iniciar Sesión</button>
      <button onclick="switchTab(1)" id="tabRegister" class="tab-btn">Crear Cuenta</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="form-wrapper">
      <div class="form-group">
        <label class="section-label">DNI (8 dígitos)</label>
        <input id="loginDni" type="text" maxlength="8" inputmode="numeric" class="input-control" placeholder="16528921">
      </div>
      <div class="form-group">
        <label class="section-label">Contraseña</label>
        <input id="loginPass" type="password" class="input-control" placeholder="Últimos 4 dígitos del DNI">
      </div>
      <button onclick="doLogin()" class="btn-primary">Ingresar</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden form-wrapper">
      <div>
        <div class="form-group">
          <label class="section-label">DNI</label>
          <input id="regDni" type="text" maxlength="8" inputmode="numeric" 
                 oninput="if(this.value.length===8) checkDniAutoFill()" 
                 class="input-control" placeholder="12345678">
        </div>

        <div class="form-row">
          <div>
            <label class="section-label">Nombres</label>
            <input id="regNames" type="text" class="input-control">
          </div>
          <div>
            <label class="section-label">Apellidos</label>
            <input id="regApellidos" type="text" class="input-control">
          </div>
        </div>

        <div class="form-group">
          <label class="section-label">Empresa</label>
          <select id="regEmpresa" class="input-control">
            <option value="">Cargando empresas...</option>
          </select>
          <p id="empresaStatus" class="text-feedback mt-1" style="font-size:12px;"></p>
        </div>

        <div class="form-group">
          <label class="section-label">Cargo</label>
          <select id="regCargo" onchange="toggleBreveteField()" class="input-control">
            <option value="AUXILIAR">Auxiliar</option>
            <option value="CONDUCTOR">Conductor</option>
          </select>
        </div>

        <!-- Foto DNI -->
        <div class="file-panel">
          <label class="section-label">Foto DNI</label>
          <div onclick="triggerFile('dni')" class="drop-zone">
            <i class="fas fa-camera icon-xl" style="font-size:28px; margin-bottom:8px;"></i>
            <p class="drop-text">Toca para subir foto del DNI</p>
            <div id="previewDni" class="hidden mt-2 text-green-600 text-sm">✅ Archivo listo</div>
          </div>
          <input type="file" id="fileDni" accept="image/*" class="hidden" onchange="handleFile(this, 'dni')">
          <input type="date" id="dniVence" class="input-control mt-3">
        </div>

        <!-- Brevete -->
        <div id="breveteGroup" class="hidden file-panel amber">
          <label class="section-label">Foto Licencia (Brevete)</label>
          <div onclick="triggerFile('brevete')" class="drop-zone">
            <i class="fas fa-id-card icon-xl" style="font-size:28px; margin-bottom:8px;"></i>
            <p class="drop-text">Toca para subir foto del brevete</p>
            <div id="previewBrevete" class="hidden mt-2 text-green-600 text-sm">✅ Archivo listo</div>
          </div>
          <input type="file" id="fileBrevete" accept="image/*" class="hidden" onchange="handleFile(this, 'brevete')">
          <input type="date" id="breveteVence" class="input-control mt-3">
        </div>

        <button onclick="doRegister()" id="btnRegister" class="btn-success">Crear Cuenta</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashScreen" class="hidden flex flex-col min-h-screen">
    <div class="topbar">
      <div class="avatar"><i class="fas fa-user"></i></div>
      <div>
        <div id="dashNombre" class="font-semibold"></div>
        <div id="dashCargo" class="text-sm text-gray-500"></div>
      </div>
    </div>
    <div class="dash-body">
      <p class="text-center text-gray-500">Dashboard cargado correctamente</p>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-xl text-sm"></div>
</div>

<script>
// ==================== CONFIG ====================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAbsjeav_HQXjD-R6JRj83uaTskp0LVD_NK3W1b78pibfmmMQ1FlNYpX1Lgh-I6bD0Sg/exec"; 
// ←←← CAMBIA ESTA LÍNEA con tu URL real del Web App

let currentUser = null;

// ==================== CALLBACKEND (usa api.js) ====================
async function callBackend(action, payload = {}) {
  try {
    console.log(`→ Enviando: ${action}`, payload);
    const data = await window.API.callBackend(action, payload);
    return data;
  } catch (err) {
    console.error("Error callBackend:", err);
    showToast(err.message || "Error de conexión", "error");
    throw err;
  }
}

// ==================== TABS ====================
function switchTab(n) {
  document.getElementById("loginForm").classList.toggle("hidden", n === 1);
  document.getElementById("registerForm").classList.toggle("hidden", n === 0);
  document.getElementById("tabLogin").classList.toggle("active", n === 0);
  document.getElementById("tabRegister").classList.toggle("active", n === 1);
}

// ==================== LOGIN ====================
async function doLogin() {
  const dni = document.getElementById("loginDni").value.trim();
  const pass = document.getElementById("loginPass").value.trim();
  if (!dni || dni.length !== 8) return showToast("DNI inválido", "error");

  try {
    const data = await callBackend("LOGIN", { username: dni, password: pass });
    currentUser = data;
    localStorage.setItem("bpdt_tripulante", JSON.stringify(data));
    showDashboard();
  } catch (e) {
    showToast(e.message, "error");
  }
}

// ==================== AUTO FILL DNI ====================
async function checkDniAutoFill() {
  const dni = document.getElementById("regDni").value.trim();
  if (dni.length !== 8) return;

  try {
    const res = await callBackend("CONSULTAR_DNI_REGISTRO", { dni });
    if (res.tiene_cuenta) {
      showToast("Este DNI ya tiene cuenta. Inicia sesión.", "error");
      switchTab(0);
      return;
    }
    if (res.found) {
      document.getElementById("regNames").value = res.nombres || "";
      document.getElementById("regApellidos").value = res.apellidos || "";
      document.getElementById("regEmpresa").value = res.empresaId || "";
      document.getElementById("regCargo").value = res.cargo || "AUXILIAR";
    }
  } catch (e) {}
}

// ==================== REGISTRO ====================
async function doRegister() {
  const dni = document.getElementById("regDni").value.trim();
  const nombres = document.getElementById("regNames").value.trim();
  const apellidos = document.getElementById("regApellidos").value.trim();
  const empresaId = document.getElementById("regEmpresa").value;
  const cargo = document.getElementById("regCargo").value;

  if (!dni || dni.length !== 8) return showToast("DNI inválido", "error");
  if (!nombres || !apellidos) return showToast("Nombres y apellidos son requeridos", "error");
  if (!empresaId) return showToast("Selecciona una empresa", "error");

  try {
    const params = {
      dni,
      nombres,
      apellidos,
      empresa_id: empresaId,
      cargo
    };
    const result = await callBackend("REGISTER_TRIPULANTE", params);
    showToast(result.mensaje || "Registro exitoso", "success");
    // Opcional: redirigir a login
    switchTab(0);
  } catch (e) {
    showToast(e.message, "error");
  }
}

// ==================== DASHBOARD ====================
function showDashboard() {
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("dashScreen").classList.remove("hidden");
  document.getElementById("dashNombre").textContent = currentUser.nombre || "Usuario";
  document.getElementById("dashCargo").textContent = currentUser.cargo || "";
}

// ==================== TOAST ====================
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.backgroundColor = type === "success" ? "#1D9E75" : "#A32D2D";
  t.style.color = "white";
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 4000);
}

// ==================== FILE HELPERS (por ahora básicos) ====================
function triggerFile(type) {
  document.getElementById(`file${type.charAt(0).toUpperCase() + type.slice(1)}`).click();
}

function handleFile(input, type) {
  if (input.files.length > 0) {
    document.getElementById(`preview${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.remove("hidden");
  }
}

function toggleBreveteField() {
  const cargo = document.getElementById("regCargo").value;
  document.getElementById("breveteGroup").classList.toggle("hidden", cargo !== "CONDUCTOR");
}

// ==================== INIT - CARGA DE EMPRESAS ====================
async function init() {
  console.log("🚀 Iniciando aplicación Tripulante...");

  try {
    const empresas = await callBackend("GET_LISTA_EMPRESAS");
    console.log("✅ Empresas recibidas:", empresas);

    const sel = document.getElementById("regEmpresa");
    sel.innerHTML = '<option value="">Selecciona empresa...</option>';

    if (empresas && empresas.length > 0) {
      empresas.forEach(e => {
        const opt = document.createElement("option");
        opt.value = e.id;
        opt.textContent = e.nombre;
        sel.appendChild(opt);
      });
      document.getElementById("empresaStatus").innerHTML = 
        `<span style="color:#1D9E75">✓ ${empresas.length} empresas cargadas</span>`;
    } else {
      document.getElementById("empresaStatus").innerHTML = 
        `<span style="color:#A32D2D">⚠ No se encontraron empresas</span>`;
    }
  } catch (e) {
    console.error("❌ Error cargando empresas:", e);
    document.getElementById("empresaStatus").innerHTML = 
      `<span style="color:#A32D2D">✗ Error al cargar empresas</span>`;
  }
}

window.onload = init;
</script>
</body>
</html>
