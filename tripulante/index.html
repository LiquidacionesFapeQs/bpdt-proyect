<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT-BPDT | Portal Tripulación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="app-container" class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">HT-BPDT</h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Sistema de Gestión de Transportes</p>
        </div>

        <div id="view-login" class="space-y-4 animate-fade-in">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-600 ml-1 uppercase">DNI de Usuario</label>
                <input type="number" id="login-dni" placeholder="Ingrese su DNI" 
                       class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-600 ml-1 uppercase">Contraseña</label>
                <input type="password" id="login-pass" placeholder="••••" 
                       class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <button onclick="handleLogin()" 
                    class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-slate-800 active:scale-[0.98] transition-all shadow-lg">
                INGRESAR AL PORTAL
            </button>
            <p class="text-center text-sm text-slate-500 pt-2">
                ¿No tienes cuenta? <a href="#" onclick="showView('register')" class="text-blue-600 font-bold hover:underline">Regístrate aquí</a>
            </p>
        </div>

        <div id="view-register" class="hidden space-y-4 animate-fade-in">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest text-center mb-2">Nuevo Registro</h2>
            
            <div id="reg-step-1" class="p-4 bg-blue-50 rounded-xl border border-blue-100 shadow-sm">
                <label class="text-[10px] font-black text-blue-700 block mb-2 uppercase">1. Validación de DNI</label>
                <div class="flex gap-2">
                    <input type="number" id="reg-dni" placeholder="Número de DNI" 
                           class="flex-1 p-3 border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <button onclick="handleCheckDni()" 
                            class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Verificar</button>
                </div>
            </div>

            <div id="reg-fields" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-nombres" placeholder="Nombres" class="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" id="reg-apellidos" placeholder="Apellidos" class="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <select id="reg-cargo" onchange="toggleFieldsByCargo()" 
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">Seleccione su Cargo</option>
                    <option value="CONDUCTOR">CONDUCTOR</option>
                    <option value="AUXILIAR">AUXILIAR</option>
                </select>

                <select id="reg-empresa" 
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">Cargando empresas...</option>
                </select>

                <div class="space-y-4 p-4 bg-slate-50 rounded-xl border border-slate-200 shadow-inner">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Documentación Obligatoria</p>
                    
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-700">Foto de DNI:</label>
                        <input type="file" id="file-dni" accept="image/*,application/pdf" 
                               class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        <label class="text-[10px] text-slate-500 font-bold ml-1 italic">Fecha de Vencimiento:</label>
                        <input type="date" id="venc-dni" class="w-full p-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div id="box-licencia" class="hidden space-y-2 border-t border-slate-200 pt-3">
                        <label class="text-xs font-bold text-slate-700">Foto de Licencia:</label>
                        <input type="file" id="file-licencia" accept="image/*,application/pdf" 
                               class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                        <label class="text-[10px] text-slate-500 font-bold ml-1 italic">Fecha de Vencimiento:</label>
                        <input type="date" id="venc-licencia" class="w-full p-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="p-3 bg-amber-50 rounded-xl border border-amber-100 flex items-center gap-3">
                    <span class="text-lg">🔐</span>
                    <p class="text-[10px] text-amber-800 leading-tight">
                        <b>IMPORTANTE:</b> Tu contraseña de acceso se generará automáticamente con los <b>últimos 4 dígitos de tu DNI</b>.
                    </p>
                </div>

                <button onclick="handleRegister()" id="btn-register" 
                        class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 active:scale-95 shadow-lg transition-all uppercase tracking-wide">
                    Finalizar y Registrar
                </button>
            </div>
            
            <button onclick="showView('login')" class="w-full text-slate-400 text-xs font-bold hover:text-slate-600 transition-colors">
                « VOLVER AL INICIO DE SESIÓN
            </button>
        </div>

        <div id="view-dashboard" class="hidden space-y-6 animate-fade-in text-center">
            <div id="user-info" class="p-4 bg-slate-50 rounded-2xl border border-slate-100"></div>
            <div id="compliance-card" class="p-6 rounded-2xl text-white shadow-xl transition-all duration-500">
                <p class="text-xs opacity-80 uppercase tracking-widest mb-1">Tu Cumplimiento Actual</p>
                <h3 id="compliance-pct" class="text-5xl font-black italic">0%</h3>
                <p id="compliance-label" class="text-sm font-bold mt-2 bg-white/20 py-1 px-3 rounded-full inline-block"></p>
            </div>
            <button onclick="location.reload()" class="w-full py-3 text-slate-400 text-xs font-bold border-t hover:text-rose-500 transition-colors">
                CERRAR SESIÓN SEGURA
            </button>
        </div>

        <div id="loader" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center z-50">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-16 w-16 mb-4"></div>
            <p id="loader-text" class="text-white text-sm font-bold tracking-widest uppercase animate-pulse">Procesando...</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
