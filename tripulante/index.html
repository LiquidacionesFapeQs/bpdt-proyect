<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT-BPDT | Portal Tripulación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #E30613;
            --brand-grey: #707070;
            --brand-light-grey: #F5F5F5;
        }
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: var(--brand-red); animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .header-curve { 
            border-radius: 0 0 40px 40px; 
            background: linear-gradient(135deg, #E30613 0%, #8b0000 100%); 
        }
        .bg-brand-red { background-color: var(--brand-red); }
        .text-brand-red { color: var(--brand-red); }
        
        .kpi-card { margin-top: -40px; }
    </style>
</head>
<body class="bg-[#F5F5F5] min-h-screen flex justify-center items-start sm:items-center">

    <div id="app-container" class="w-full max-w-[480px] min-h-screen sm:min-h-0 sm:rounded-3xl sm:shadow-2xl overflow-hidden bg-white relative">
        
        <div id="view-login" class="p-8 space-y-8 animate-fade-in pt-16">
            <div class="text-center">
                <div class="inline-block p-4 bg-brand-red rounded-2xl shadow-lg mb-4">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">HT-BPDT</h1>
                <p class="text-[#707070] text-xs font-bold uppercase tracking-[0.2em]">Portal de Tripulación</p>
            </div>

            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 ml-1 uppercase">DNI de Usuario</label>
                    <input type="number" id="login-dni" placeholder="Ingresa tu DNI" 
                           class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none transition-all text-lg font-medium">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 ml-1 uppercase">Contraseña</label>
                    <input type="password" id="login-pass" placeholder="Ingresa tu clave" 
                           class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none transition-all text-lg font-medium">
                </div>
                <button onclick="handleLogin()" 
                        class="w-full bg-brand-red text-white p-5 rounded-2xl font-bold hover:bg-[#a5040d] active:scale-[0.98] transition-all shadow-xl shadow-red-100">
                    INGRESAR AL PORTAL
                </button>
            </div>

            <p class="text-center text-sm text-slate-500">
                ¿Nuevo ingreso? <button onclick="showView('register')" class="text-brand-red font-bold hover:underline">Regístrate aquí</button>
            </p>
        </div>

        <div id="view-register" class="hidden p-6 space-y-4 animate-fade-in">
            <div class="flex items-center gap-4 mb-4">
                <button onclick="showView('login')" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h2 class="text-xl font-bold text-slate-800">Crear Perfil</h2>
            </div>
            
            <div id="reg-step-1" class="p-5 bg-red-50 rounded-2xl border border-red-100 shadow-sm space-y-3">
                <label class="text-xs font-black text-brand-red block uppercase">1. Validación de Identidad</label>
                <div class="flex gap-2">
                    <input type="number" id="reg-dni" placeholder="DNI" 
                           class="flex-1 p-3 border border-red-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                    <button onclick="handleCheckDni()" class="bg-brand-red text-white px-4 rounded-xl font-bold text-sm">Verificar</button>
                </div>
            </div>

            <div id="reg-fields" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="reg-nombres" placeholder="Nombres" disabled class="p-4 bg-slate-100 border border-slate-200 rounded-xl text-sm font-semibold">
                    <input type="text" id="reg-apellidos" placeholder="Apellidos" disabled class="p-4 bg-slate-100 border border-slate-200 rounded-xl text-sm font-semibold">
                </div>

                <select id="reg-cargo" onchange="toggleFieldsByCargo()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold outline-none focus:ring-2 focus:ring-red-500">
                    <option value="">Seleccione Cargo</option>
                    <option value="CONDUCTOR">CONDUCTOR</option>
                    <option value="AUXILIAR">AUXILIAR</option>
                </select>

                <select id="reg-empresa" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold outline-none focus:ring-2 focus:ring-red-500">
                    <option value="">Cargando empresas...</option>
                </select>

                <div class="space-y-4 p-5 bg-slate-50 rounded-2xl border border-slate-200">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Fotos y Vencimientos</p>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Foto DNI (PDF/Imagen):</label>
                        <input type="file" id="file-dni" accept="image/*,application/pdf" class="w-full text-xs">
                        <input type="date" id="venc-dni" class="w-full p-3 text-sm border border-slate-200 rounded-xl">
                    </div>

                    <div id="box-licencia" class="hidden space-y-2 border-t pt-3">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Foto Licencia:</label>
                        <input type="file" id="file-licencia" accept="image/*,application/pdf" class="w-full text-xs">
                        <input type="date" id="venc-licencia" class="w-full p-3 text-sm border border-slate-200 rounded-xl">
                    </div>
                </div>

                <button onclick="handleRegister()" 
                        class="w-full bg-brand-red text-white p-5 rounded-2xl font-bold shadow-lg shadow-red-100 transition-all uppercase tracking-widest text-sm">
                    Finalizar Registro
                </button>
            </div>
        </div>

    <div id="view-dashboard" class="hidden animate-fade-in flex flex-col min-h-screen sm:min-h-0 bg-[#F5F5F5]">
    
    <div class="bg-[#E30613] px-8 pt-10 pb-20 relative overflow-hidden shadow-lg" style="border-radius: 0 0 40px 40px;">
        <div class="flex justify-between items-start relative z-10">
            <div class="space-y-2">
                <div class="flex items-center gap-2 opacity-90">
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                    <p class="text-white text-[10px] font-bold uppercase tracking-widest">Portal Tripulación</p>
                </div>
                
                <h2 id="display-name" class="text-3xl font-[900] text-white leading-tight uppercase tracking-tight">
                    Cargando...
                </h2>
                
                <div class="flex flex-col gap-2 items-start">
                    <span id="display-cargo" class="px-4 py-1 bg-white/20 rounded-full text-[10px] font-black text-white uppercase backdrop-blur-sm italic">
                        ---
                    </span>
                    <p id="display-empresa" class="text-white text-xs font-bold opacity-90 tracking-wide uppercase">
                        ---
                    </p>
                </div>
            </div>

            <div class="flex gap-3 items-center">
                
                <button onclick="recalculate()" id="btn-refresh" 
                        class="flex items-center justify-center bg-white rounded-full transition-all duration-300 hover:scale-105 active:scale-95 shadow-[0_10px_25px_-5px_rgba(0,0,0,0.2)] group"
                        style="width: 100px; height: 50px;">
                    
                    <svg id="icon-refresh" class="w-6 h-6 text-[#007AC3] transition-transform duration-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h5M20 20v-5h-5M2.34 15.11A9 9 0 0111.77 3c4.2 0 7.84 2.87 8.93 6.79M19.66 8.89A9 9 0 0112.23 21c-4.2 0-7.84-2.87-8.93-6.79"></path>
                    </svg>
                </button>

                <button onclick="location.reload()" class="p-3 bg-transparent border border-white/30 rounded-2xl text-white hover:bg-white/10 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                </button>
            </div>

    <div class="px-6 -mt-12 relative z-20">
        <div id="compliance-card" class="bg-white rounded-[32px] p-8 shadow-2xl shadow-slate-200 flex items-center gap-6 border border-slate-50">
            <div id="compliance-ring" class="relative w-24 h-24 rounded-full flex items-center justify-center p-2">
                <div class="bg-white w-full h-full rounded-full flex items-center justify-center shadow-inner">
                    <span id="compliance-pct" class="text-2xl font-[900] text-slate-800 italic tracking-tighter">0%</span>
                </div>
            </div>
            
            <div class="flex-1 space-y-1">
                <p id="compliance-label" class="text-lg font-black leading-tight uppercase">
                    SIN CALIFICAR
                </p>
                <p class="text-xs text-slate-400 font-medium leading-tight italic">
                    Nivel de cumplimiento reglamentario para el servicio.
                </p>
            </div>
        </div>
    </div>

    <div class="px-8 mt-10 pb-10">
        <div id="docs-list" class="space-y-4">
            </div>
    </div>
</div>

        <div id="loader" class="hidden fixed inset-0 bg-white/80 backdrop-blur-md flex flex-col items-center justify-center z-50">
            <div class="loader ease-linear rounded-full border-4 border-t-4 h-14 w-14 mb-4"></div>
            <p id="loader-text" class="text-brand-red text-[10px] font-black tracking-widest uppercase animate-pulse">Cargando...</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
