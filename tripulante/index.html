<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT-BPDT | Portal Tripulación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #E30613;
            --brand-grey: #707070;
            --brand-light-grey: #F5F5F5;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--brand-light-grey);
        }
        .loader { border-top-color: var(--brand-red); animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .header-curve { 
            border-radius: 0 0 40px 40px; 
            background: linear-gradient(135deg, #E30613 0%, #8b0000 100%); 
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="min-h-screen flex justify-center items-start sm:items-center">

    <div id="app-container" class="w-full max-w-[480px] min-h-screen sm:min-h-[85vh] sm:rounded-3xl sm:shadow-2xl overflow-hidden bg-white relative mx-auto">
        
        <div id="view-login" class="p-8 space-y-8 animate-fade-in pt-16">
            <div class="text-center">
                <div class="inline-block p-6 mb-4 bg-red-50 rounded-full">
                    <svg class="w-20 h-20 text-[#E30613]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12" />
                        <path d="M14 8h5l3 3v7h-8" />
                        <path d="M14 11h3l1.5 2h-4.5V11z" />
                        <circle cx="5.5" cy="18.5" r="2.5" />
                        <circle cx="18.5" cy="18.5" r="2.5" />
                        <path d="M2 22h20" stroke-dasharray="2 4"/>
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight uppercase">HT-BPDT</h1>
                <p class="text-[#707070] text-xs font-bold uppercase tracking-[0.2em]">Gestión de Transporte</p>
            </div>

            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 ml-1 uppercase">DNI de Usuario</label>
                    <input type="number" id="login-dni" placeholder="Ingresa tu DNI" 
                           class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none transition-all text-lg font-medium">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 ml-1 uppercase">Contraseña</label>
                    <input type="password" id="login-pass" placeholder="Últimos 4 dígitos del DNI" 
                           class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-red-500 outline-none transition-all text-lg font-medium">
                </div>
                <button onclick="handleLogin()" 
                        class="w-full bg-[#E30613] text-white p-5 rounded-2xl font-bold hover:bg-[#a5040d] active:scale-[0.98] transition-all shadow-xl shadow-red-100 uppercase tracking-widest">
                    INGRESAR
                </button>
            </div>

            <p class="text-center text-sm text-slate-500">
                ¿Nuevo ingreso? <button onclick="showView('register')" class="text-[#E30613] font-bold hover:underline">Regístrate aquí</button>
            </p>
        </div>

        <div id="view-register" class="hidden p-6 space-y-4 animate-fade-in overflow-y-auto max-h-screen pb-10">
            <div class="flex items-center gap-4 mb-4">
                <button onclick="showView('login')" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h2 class="text-xl font-bold text-slate-800">Crear Perfil</h2>
            </div>
            
            <div id="reg-step-1" class="p-5 bg-red-50 rounded-2xl border border-red-100 space-y-3">
                <label class="text-xs font-black text-[#E30613] block uppercase tracking-tighter">1. Validación de Identidad</label>
                <div class="flex gap-2">
                    <input type="number" id="reg-dni" placeholder="DNI" 
                           class="flex-1 p-3 border border-red-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                    <button onclick="handleCheckDni()" class="bg-[#E30613] text-white px-4 rounded-xl font-bold text-sm">Verificar</button>
                </div>
            </div>

            <div id="reg-fields" class="hidden space-y-4 animate-fade-in">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="reg-nombres" placeholder="Nombres" class="p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-500" disabled>
                    <input type="text" id="reg-apellidos" placeholder="Apellidos" class="p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-500" disabled>
                </div>

                <select id="reg-cargo" onchange="toggleFieldsByCargo()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold outline-none focus:ring-2 focus:ring-red-500">
                    <option value="">Seleccione Cargo</option>
                    <option value="CONDUCTOR">CONDUCTOR</option>
                    <option value="AUXILIAR">AUXILIAR</option>
                </select>

                <select id="reg-empresa" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold outline-none focus:ring-2 focus:ring-red-500">
                    <option value="">Cargando empresas...</option>
                </select>

                <div class="space-y-4 p-5 bg-slate-50 rounded-2xl border border-slate-200">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Documentación Obligatoria</p>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-700 uppercase">Foto DNI (Lado Frontal):</label>
                        <input type="file" id="file-dni" accept="image/*" class="w-full text-xs">
                        <label class="text-[10px] font-bold text-slate-700 uppercase block mt-2">Fecha de Vencimiento DNI:</label>
                        <input type="date" id="venc-dni" class="w-full p-3 text-sm border border-slate-200 rounded-xl">
                    </div>

                    <div id="box-licencia" class="hidden space-y-2 border-t pt-3 mt-3">
                        <label class="text-[10px] font-bold text-slate-700 uppercase">Foto Licencia de Conducir:</label>
                        <input type="file" id="file-licencia" accept="image/*" class="w-full text-xs">
                        <label class="text-[10px] font-bold text-slate-700 uppercase block mt-2">Vencimiento de Licencia:</label>
                        <input type="date" id="venc-licencia" class="w-full p-3 text-sm border border-slate-200 rounded-xl">
                    </div>
                </div>

                <button onclick="handleRegister()" 
                        class="w-full bg-[#E30613] text-white p-5 rounded-2xl font-bold shadow-lg shadow-red-100 transition-all uppercase tracking-widest text-sm">
                    Finalizar y Subir Documentos
                </button>
            </div>
        </div>

        <div id="view-dashboard" class="hidden animate-fade-in flex flex-col min-h-screen bg-[#F5F5F5]">
            <div class="header-curve px-8 pt-10 pb-20 relative shadow-xl text-white">
                <div class="flex justify-between items-start relative z-10">
                    <div id="user-info" class="space-y-1">
                        <h2 class="text-2xl font-black uppercase">Cargando...</h2>
                    </div>
                    <button onclick="location.reload()" class="p-3 bg-white/10 rounded-2xl hover:bg-black/20 backdrop-blur-md border border-white/20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </div>

            <div class="px-6 -mt-10 relative z-10">
                <div id="compliance-card" class="p-6 rounded-3xl shadow-xl flex items-center gap-6 border border-white/20 transition-all duration-500">
                    <div class="relative w-16 h-16 rounded-full flex items-center justify-center bg-white/20 backdrop-blur-sm">
                        <span id="compliance-pct" class="text-lg font-black text-white">0%</span>
                    </div>
                    <div class="flex-1">
                        <p id="compliance-label" class="text-xs font-black text-white uppercase tracking-widest">Calculando...</p>
                        <p class="text-[10px] text-white/80 font-medium leading-tight mt-1">Cumplimiento de Buenas Prácticas de Distribución.</p>
                    </div>
                </div>
            </div>

            <div id="docs-list" class="px-6 mt-8 pb-10 space-y-3">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">Estado de tus documentos</p>
                </div>
        </div>

        <div id="loader" class="hidden fixed inset-0 bg-white/95 backdrop-blur-md flex flex-col items-center justify-center z-50">
            <div class="loader ease-linear rounded-full border-4 border-t-4 h-16 w-16 mb-4 border-slate-100"></div>
            <p id="loader-text" class="text-[#E30613] text-xs font-black tracking-[0.2em] uppercase">Procesando...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
